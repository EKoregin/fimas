version: '3.9'

services:
  db:
    image: postgres:16
    container_name: postgres-ext
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: fimas
      POSTGRES_USER: fimas
      POSTGRES_DB: fimas
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5