spring:
  application:
    name: fimas
  jpa:
    database: postgresql
#    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/fimas
    username: fimas
    password: fimas
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/fimas
    user: fimas
    password: fimas

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8085

logging:
  level:
    root: info
    org.atmosphere: WARN   # или ERROR, если совсем убрать WARN
      # или точнее:
    org.atmosphere.cpr.AtmosphereResourceImpl: ERROR
    com.vaadin.flow.server.communication.PushHandler: WARN  # или INFO

vaadin:
  exclude-urls: /swagger-ui/**,/v3/api-docs/**