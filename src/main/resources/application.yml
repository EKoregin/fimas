spring:
  application:
    name: fimas
  jpa:
    database: postgresql
    show-sql: false
    hibernate:
      ddl-auto: none
  datasource:
    url: jdbc:postgresql://localhost:5432/fimas
    username: fimas
    password: fimas
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/fimas
    user: fimas
    password: fimas

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8085

logging:
  level:
    root: info

vaadin:
  url-mapping: /app/*
  exclude-urls: /swagger-ui/**,/v3/api-docs/**